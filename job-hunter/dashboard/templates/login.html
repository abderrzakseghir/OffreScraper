<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Hunter — Connexion</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 1rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo .icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 0.5rem;
        }
        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f8fafc;
            letter-spacing: -0.025em;
        }
        .logo p {
            color: #64748b;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .input-wrap {
            position: relative;
            margin-bottom: 1.25rem;
        }

        input[type="text"] {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            color: #f1f5f9;
            font-size: 1.1rem;
            letter-spacing: 0.2em;
            font-family: 'Courier New', monospace;
            font-weight: 600;
            text-transform: uppercase;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]::placeholder {
            letter-spacing: 0.05em;
            font-weight: 400;
            text-transform: none;
            color: #475569;
            font-size: 0.9rem;
        }
        input[type="text"]:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 0.5rem;
            padding: 0.85rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.025em;
        }
        .btn-login:hover { opacity: 0.9; }
        .btn-login:active { transform: scale(0.98); }

        .error-banner {
            background: #450a0a;
            border: 1px solid #991b1b;
            color: #f87171;
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .hint {
            text-align: center;
            color: #475569;
            font-size: 0.8rem;
            margin-top: 1.5rem;
            line-height: 1.5;
        }
        .hint a {
            color: #6366f1;
            text-decoration: none;
        }
        .hint a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .login-card { padding: 1.75rem 1.25rem; margin: 1rem; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <span class="icon">🎯</span>
            <h1>Job Hunter</h1>
            <p>Entrez votre code d'accès pour continuer</p>
        </div>

        {% if error %}
        <div class="error-banner">
            <span>⛔</span>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}" novalidate>
            <label for="code">Code d'accès</label>
            <div class="input-wrap">
                <input
                    type="text"
                    id="code"
                    name="code"
                    placeholder="ex : ALPHA-2024"
                    autocomplete="off"
                    autofocus
                    required
                >
            </div>
            <button type="submit" class="btn-login">🔓 Accéder à l'application</button>
        </form>

        <p class="hint">
            Vous n'avez pas de code ?<br>
            Contactez l'administrateur pour en obtenir un.
        </p>
    </div>
</body>
</html>
